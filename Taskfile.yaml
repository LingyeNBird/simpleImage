version: '3'

vars:
  IMAGE: lingyenbird/simple-chat2image
  TAG: '{{default "latest" .TAG}}'
  PLATFORMS: '{{default "linux/amd64,linux/arm64" .PLATFORMS}}'
  BUILDER: '{{default "chat2image-multiarch" .BUILDER}}'
  GH_REPO: LingyeNBird/simpleImage
  GIT_REF: '{{default "main" .GIT_REF}}'

tasks:
  docker:buildx:ensure:
    desc: Ensure a docker-container buildx builder exists
    status:
      - docker buildx inspect {{.BUILDER}}
    cmds:
      - docker buildx create --name {{.BUILDER}} --driver docker-container --use

  docker:buildx:bootstrap:
    desc: Bootstrap the multi-platform buildx builder
    deps:
      - docker:buildx:ensure
    cmds:
      - docker buildx inspect --bootstrap {{.BUILDER}}

  docker:recreate:
    desc: Pull latest image and recreate containers
    cmds:
      - docker compose pull
      - docker compose up -d --force-recreate

  docker:publish:
    desc: Build and push Docker Hub image
    deps:
      - docker:buildx:bootstrap
    cmds:
      - docker buildx build --builder {{.BUILDER}} --platform {{.PLATFORMS}} -t {{.IMAGE}}:{{.TAG}} --push .

  docker:publish-latest:
    desc: Build and push latest Docker Hub image
    cmds:
      - task: docker:publish
        vars:
          TAG: latest

  docker:ci-publish:
    desc: Push git tag to lingye and let GitHub Actions publish image
    cmds:
      - GIT_MASTER=1 git tag -a {{.TAG}} -m "Release {{.TAG}}"
      - GIT_MASTER=1 git push lingye refs/tags/{{.TAG}}
      - gh run list --repo {{.GH_REPO}} --workflow docker-publish.yml --limit 1
